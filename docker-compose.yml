version: "3.9"

services:
  postgres:
    image: postgres:18-alpine
    container_name: payments-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: payments
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d payments"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.3-management-alpine
    container_name: payments-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: payments-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      API_KEY: dev-api-key
      DATABASE_URL: postgresql+asyncpg://user:pass@postgres:5432/payments
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      WEBHOOK_TIMEOUT: 5
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000

  consumer:
    build: .
    container_name: payments-consumer
    restart: unless-stopped
    environment:
      API_KEY: dev-api-key
      DATABASE_URL: postgresql+asyncpg://user:pass@postgres:5432/payments
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      WEBHOOK_TIMEOUT: 5
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: uv run python -m app.consumer_main # файл consumer_main.py ещё не создан, но будет позже

volumes:
  pgdata:
  rabbitdata:
